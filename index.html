<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCHI GF: CPU & Multi Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .bg-toilet { background-color: #4e342e; background-image: radial-gradient(#3e2723 1px, transparent 1px); background-size: 20px 20px; }
        .card-shadow { box-shadow: 0 4px 0 #3e2723; }
        .card-shadow:active:not(.disabled) { box-shadow: none; transform: translateY(4px); }
        .p-card-bg { background: rgba(0, 0, 0, 0.2); }
        .p-card-active { background: rgba(255, 235, 59, 0.15); border-color: #ffeb3b; }
        .bar-mp { background-color: #00b0ff; }
        @keyframes float-up { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-60px); } }
        .animate-float-up { animation: float-up 1s forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s 3; }
        @keyframes unchi-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-unchi-spin { animation: unchi-spin 0.6s linear infinite; }
    </style>
</head>
<body class="bg-toilet text-white font-sans select-none overflow-hidden text-sm">
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = 'https://lptcprnbkfvptdaaztwi.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_WTA3ypGwzHGUAtLkSllJvA_EIUDAa1v';

const BASICS = [
    { name: "やわらかうんち", atk: 10, mp: 0, acc: 100, heal: 0, mpRec: 0 },
    { name: "かためうんち", atk: 30, mp: -2, acc: 100, heal: 0, mpRec: 0 },
    { name: "下痢", atk: 30, mp: -1, acc: 50, heal: 0, mpRec: 0 }
];
const RANDOM_POOL = [
    { name: "紙で拭く", atk: 0, mp: -1, acc: 100, heal: 20, mpRec: 0, weight: 20 },
    { name: "きばる", atk: 20, mp: -1, acc: 75, heal: 0, mpRec: 0, multi: 2, weight: 20 },
    { name: "宿便", atk: 50, mp: -3, acc: 75, heal: 0, mpRec: 0, weight: 10 },
    { name: "ペーパー補充", atk: 0, mp: 0, acc: 100, heal: 0, mpRec: 3, weight: 30 },
    { name: "野グソ", atk: 20, mp: 0, acc: 100, heal: 0, mpRec: 2, weight: 15 },
    { name: "しょんべん", atk: 50, mp: -2, acc: 100, heal: 20, mpRec: 0, weight: 5 }
];

function App() {
    const [sb, setSb] = useState(null);
    const [view, setView] = useState('menu');
    const [gameState, setGameState] = useState({ players: [], turn: 0, log: "便所へようこそ。", version: 0, winner: null });
    const [rooms, setRooms] = useState({});
    const [myName, setMyName] = useState('プレイヤー1');
    const [localNames, setLocalNames] = useState(['プレイヤー2', 'プレイヤー3', 'プレイヤー4']);
    const [localPlayerCount, setLocalPlayerCount] = useState(3);
    const [roomName, setRoomName] = useState('');
    const [targetOverlay, setTargetOverlay] = useState(null);
    const [effects, setEffects] = useState([]);
    const [isRefreshing, setIsRefreshing] = useState(false);
    const [mode, setMode] = useState('local'); // 'local' | 'online' | 'cpu'

    const channelRef = useRef(null);
    const lobbyChannelRef = useRef(null);
    const myId = useRef(Math.random().toString(36).substring(7));
    const isHost = useRef(false);

    useEffect(() => {
        const init = () => {
            if (window.supabase) setSb(window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY));
            else setTimeout(init, 500);
        };
        init();
    }, []);

    useEffect(() => {
        if (!sb) return;
        const lobbyChannel = sb.channel('unchi-lobby', { config: { presence: { key: myId.current } } });
        lobbyChannelRef.current = lobbyChannel;
        lobbyChannel.on('presence', { event: 'sync' }, () => {
            const state = lobbyChannel.presenceState();
            const activeRooms = {};
            Object.values(state).forEach(presences => {
                presences.forEach(p => { if (p.isHost) activeRooms[p.hostId] = p; });
            });
            setRooms(activeRooms);
        }).subscribe();
        return () => { lobbyChannel.unsubscribe(); };
    }, [sb]);

    const triggerEffect = (id, val, type) => {
        const key = Math.random();
        setEffects(prev => [...prev, { id, val, type, key }]);
        setTimeout(() => setEffects(prev => prev.filter(e => e.key !== key)), 1000);
    };

    // --- CPU思考ロジック ---
    useEffect(() => {
        if (gameState.winner) return;
        const activePlayer = gameState.players[gameState.turn];
        if (activePlayer && activePlayer.isCPU && !activePlayer.isDead) {
            const timer = setTimeout(() => {
                // 出せるカードを抽出
                const playableIndices = activePlayer.hand
                    .map((c, i) => (activePlayer.mp + (c.mp < 0 ? c.mp : 0) >= 0 ? i : -1))
                    .filter(i => i !== -1);
                
                const cardIdx = playableIndices[Math.floor(Math.random() * playableIndices.length)];
                const card = activePlayer.hand[cardIdx];
                
                let targetIdx = gameState.turn;
                if (card.atk && !card.multi) {
                    const targets = gameState.players.filter((p, idx) => !p.isDead && idx !== gameState.turn);
                    if (targets.length > 0) {
                        const target = targets[Math.floor(Math.random() * targets.length)];
                        targetIdx = gameState.players.indexOf(target);
                    }
                }
                processBattle(gameState.turn, cardIdx, targetIdx);
            }, 1200);
            return () => clearTimeout(timer);
        }
    }, [gameState.turn, gameState.winner]);

    // --- 通信処理 ---
    const handleCreateRoom = async () => {
        if (!sb) return alert("準備中...");
        setMode('online'); isHost.current = true;
        if (channelRef.current) sb.removeChannel(channelRef.current);
        const channel = sb.channel(`room-${myId.current}`);
        channelRef.current = channel;
        channel
            .on('broadcast', { event: 'action' }, ({ payload }) => { if (isHost.current) processBattle(payload.aIdx, payload.cIdx, payload.tIdx); })
            .on('broadcast', { event: 'sync' }, ({ payload }) => {
                if (!isHost.current) {
                    setGameState(payload.state);
                    if (payload.eff) triggerEffect(payload.eff.id, payload.eff.val, payload.eff.type);
                    if (payload.state.version === 1 && view !== 'game') setView('game');
                }
            })
            .on('broadcast', { event: 'join' }, ({ payload }) => {
                if (isHost.current) {
                    setGameState(prev => {
                        const nextP = [...prev.players, { name: payload.name, hp: 100, mp: 5, isDead: false, hand: [], peerId: payload.id }];
                        const nextS = { ...prev, players: nextP, version: prev.version + 1 };
                        channel.send({ type: 'broadcast', event: 'sync', payload: { state: nextS } });
                        return nextS;
                    });
                }
            })
            .subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    if (lobbyChannelRef.current) {
                        await lobbyChannelRef.current.track({ isHost: true, hostName: myName, roomName: roomName || `${myName}の便所`, hostId: myId.current });
                    }
                    setGameState({ players: [{ name: myName, hp: 100, mp: 5, isDead: false, hand: [], peerId: myId.current }], turn: 0, log: "参加者を待っています...", version: 0, winner: null });
                    setView('waiting');
                }
            });
    };

    const handleJoinRoom = (room) => {
        setMode('online'); isHost.current = false;
        if (channelRef.current) sb.removeChannel(channelRef.current);
        const channel = sb.channel(`room-${room.hostId}`);
        channelRef.current = channel;
        channel.on('broadcast', { event: 'sync' }, ({ payload }) => {
            setGameState(payload.state);
            if (payload.eff) triggerEffect(payload.eff.id, payload.eff.val, payload.eff.type);
            if (payload.state.version === 1) setView('game');
        }).subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                channel.send({ type: 'broadcast', event: 'join', payload: { name: myName, id: myId.current } });
                setView('waiting');
            }
        });
    };

    const processBattle = (aIdx, cIdx, tIdx) => {
        let s = JSON.parse(JSON.stringify(gameState));
        const attacker = s.players[aIdx];
        const card = attacker.hand[cIdx];
        let log = `【${attacker.name}】の${card.name}！`;
        attacker.mp += card.mp;
        if (card.mpRec) { attacker.mp = Math.min(10, attacker.mp + card.mpRec); triggerEffect(aIdx, card.mpRec, 'mp'); }

        if (card.multi) {
            for(let i=0; i<2; i++){
                const targets = s.players.filter((p,idx) => !p.isDead && idx !== aIdx);
                if (targets.length === 0) break;
                const target = targets[Math.floor(Math.random() * targets.length)];
                const rIdx = s.players.indexOf(target);
                if (Math.random()*100 <= card.acc) {
                    s.players[rIdx].hp -= card.atk; log += `<br>→${target.name}に${card.atk}ダメ`;
                    triggerEffect(rIdx, card.atk, 'dmg');
                    if(s.players[rIdx].hp <= 0) s.players[rIdx].isDead = true;
                } else { log += `<br>→${target.name}にはスカしっぺ`; triggerEffect(rIdx, 0, 'dmg'); }
            }
        } else {
            if (Math.random()*100 <= card.acc) {
                if(card.atk) { 
                    s.players[tIdx].hp -= card.atk; log += `${s.players[tIdx].name}に${card.atk}ダメ`; 
                    triggerEffect(tIdx, card.atk, 'dmg'); 
                    if(s.players[tIdx].hp <= 0) s.players[tIdx].isDead = true;
                }
                if(card.heal) { attacker.hp = Math.min(100, attacker.hp + card.heal); log += `HP${card.heal}回復`; triggerEffect(aIdx, card.heal, 'heal'); }
            } else { if(card.atk) triggerEffect(tIdx, 0, 'dmg'); log += `外れた！`; }
        }

        const alive = s.players.filter(p => !p.isDead);
        if (alive.length === 1) { s.winner = alive[0].name; log += `<br><strong>${alive[0].name}の勝利！</strong>`; }
        else {
            attacker.hand[cIdx] = (cIdx < 3) ? {...BASICS[cIdx]} : RANDOM_POOL[Math.floor(Math.random()*RANDOM_POOL.length)];
            let next = aIdx; do { next = (next + 1) % s.players.length; } while (s.players[next].isDead);
            s.turn = next;
        }
        s.log = log; s.version += 1;
        setGameState(s);
        if (mode === 'online' && channelRef.current) channelRef.current.send({ type: 'broadcast', event: 'sync', payload: { state: s } });
    };

    const startGame = () => {
        if (lobbyChannelRef.current) lobbyChannelRef.current.untrack();
        const startS = { ...gameState, players: gameState.players.map(p=>({...p, hand:[...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)]})), version: 1, winner: null };
        setGameState(startS);
        if (channelRef.current) channelRef.current.send({ type: 'broadcast', event: 'sync', payload: { state: startS } });
        setView('game');
    };

    const startLocalGame = () => {
        setMode('local'); isHost.current = true;
        const allNames = [myName, ...localNames].slice(0, localPlayerCount);
        const initPlayers = allNames.map(name => ({ name, hp: 100, mp: 5, isDead: false, hand: [...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)], peerId: 'local' }));
        setGameState({ players: initPlayers, turn: 0, log: "ローカル戦開始！", version: 1, winner: null });
        setView('game');
    };

    const startCPUMame = () => {
        setMode('cpu'); isHost.current = true;
        const players = [{ name: myName, hp: 100, mp: 5, isDead: false, hand: [], peerId: 'me', isCPU: false }];
        for (let i = 1; i < localPlayerCount; i++) {
            players.push({ name: `CPU_${i}`, hp: 100, mp: 5, isDead: false, hand: [], peerId: `cpu${i}`, isCPU: true });
        }
        const startS = { players: players.map(p=>({...p, hand:[...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)]})), turn: 0, log: "CPU戦開始！", version: 1, winner: null };
        setGameState(startS);
        setView('game');
    };

    const returnToMenu = () => {
        if (channelRef.current && sb) sb.removeChannel(channelRef.current);
        if (lobbyChannelRef.current) lobbyChannelRef.current.untrack();
        setGameState({ players: [], turn: 0, log: "便所へようこそ。", version: 0, winner: null });
        setView('modeSelect');
    };

    return (
        <div className="max-w-md mx-auto min-h-screen p-4 flex flex-col relative overflow-hidden">
            
            {view === 'menu' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <h1 className="text-5xl font-black text-yellow-500 mb-12 drop-shadow-lg">UNCHI GF</h1>
                    <div className="w-full space-y-6 text-center">
                        <input value={myName} onChange={e=>setMyName(e.target.value)} className="w-full bg-white/10 p-4 rounded-2xl text-center text-xl font-bold border-2 border-white/5" maxLength="8" />
                        <button onClick={() => setView('modeSelect')} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl">次へ</button>
                    </div>
                </div>
            )}

            {view === 'modeSelect' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <h2 className="text-2xl font-bold text-yellow-500 mb-8 font-bold">モードを選択</h2>
                    <div className="w-full space-y-4">
                        <button onClick={() => setView('localSetup')} className="w-full bg-white/10 p-5 rounded-2xl font-bold text-xl transition">ローカルで遊ぶ</button>
                        <button onClick={() => setView('cpuSetup')} className="w-full bg-stone-600 p-5 rounded-2xl font-bold text-xl transition">CPUと戦う</button>
                        <button onClick={() => { setRoomName(`${myName}の便所`); setView('lobby'); }} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl transition font-bold">オンライン対戦</button>
                        <button onClick={() => setView('menu')} className="text-white/50 text-xs mt-6 underline w-full text-center font-bold">名前を変更</button>
                    </div>
                </div>
            )}

            {/* ローカル設定画面 (2-4人選択復旧) */}
            {view === 'localSetup' && (
                <div className="flex-1 flex flex-col items-center justify-center p-4">
                    <h1 className="text-2xl font-black text-yellow-500 mb-6 font-bold text-center">💩 ローカル設定</h1>
                    <div className="w-full space-y-4 text-center">
                        <div className="bg-white/5 p-4 rounded-xl border border-white/5">
                            人数：
                            <select value={localPlayerCount} onChange={e => setLocalPlayerCount(parseInt(e.target.value))} className="bg-[#3e2723] p-2 rounded-lg ml-2 font-bold">
                                <option value="2">2人</option>
                                <option value="3">3人</option>
                                <option value="4">4人</option>
                            </select>
                        </div>
                        <div className="space-y-2">
                            <input value={myName} disabled className="w-full bg-white/5 p-3 rounded-xl text-center opacity-30 font-bold" />
                            {Array.from({length: localPlayerCount - 1}).map((_, i) => (
                                <input key={i} value={localNames[i]} onChange={e => { let copy = [...localNames]; copy[i] = e.target.value; setLocalNames(copy); }} className="w-full bg-white/10 p-3 rounded-xl text-center font-bold" placeholder={`プレイヤー${i+2}`} />
                            ))}
                        </div>
                        <button onClick={startLocalGame} className="w-full bg-yellow-600 text-black font-bold p-4 rounded-2xl card-shadow text-xl mt-4">開戦</button>
                        <button onClick={() => setView('modeSelect')} className="text-white/50 text-xs mt-4">戻る</button>
                    </div>
                </div>
            )}

            {/* CPU設定画面 */}
            {view === 'cpuSetup' && (
                <div className="flex-1 flex flex-col items-center justify-center p-4 text-center">
                    <h1 className="text-2xl font-black text-yellow-500 mb-6 font-bold">💩 CPU戦設定</h1>
                    <div className="w-full space-y-6">
                        <div className="bg-white/5 p-6 rounded-2xl border border-white/5">
                            対戦人数：
                            <select value={localPlayerCount} onChange={e => setLocalPlayerCount(parseInt(e.target.value))} className="bg-[#3e2723] p-2 rounded-lg ml-2 font-bold">
                                <option value="2">2人 (1vs1)</option>
                                <option value="3">3人 (1vs2)</option>
                                <option value="4">4人 (1vs3)</option>
                            </select>
                        </div>
                        <button onClick={startCPUMame} className="w-full bg-stone-100 text-stone-900 font-bold p-5 rounded-2xl card-shadow text-xl active:scale-95 transition font-black">CPUをボコる</button>
                        <button onClick={() => setView('modeSelect')} className="text-white/50 text-xs mt-4">戻る</button>
                    </div>
                </div>
            )}

            {view === 'lobby' && (
                <div className="flex-1 flex flex-col py-6">
                    <div className="flex justify-between items-end mb-6">
                        <h2 className="text-2xl font-bold text-yellow-500">便所一覧</h2>
                        <button onClick={()=>{setIsRefreshing(true); setTimeout(()=>setIsRefreshing(false), 1000);}} className="bg-[#3e2723] border border-yellow-600 px-4 py-2 rounded-xl text-xs flex items-center gap-3 active:scale-95 transition">
                            <span className={`text-2xl ${isRefreshing ? 'animate-unchi-spin' : ''}`}>💩</span>
                            <span className="font-bold font-black">再捜索</span>
                        </button>
                    </div>
                    <div className="bg-white/5 p-4 rounded-2xl mb-6 space-y-3 border border-white/5 text-center">
                        <input value={roomName} onChange={e=>setRoomName(e.target.value)} className="w-full bg-white/10 p-3 rounded-xl text-sm text-center outline-none" placeholder={`${myName}の便所`} />
                        <button onClick={handleCreateRoom} className="w-full bg-green-600 p-3 rounded-xl font-bold card-shadow active:scale-95 transition font-black">部屋を作る</button>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-3">
                        {Object.values(rooms).length === 0 ? <div className="text-center py-10 opacity-30 italic">便所がありません</div> : 
                            Object.values(rooms).map(r => (
                                <div key={r.hostId} onClick={()=>handleJoinRoom(r)} className="bg-white/10 p-4 rounded-2xl flex justify-between items-center active:bg-white/20 border border-white/5 transition-all">
                                    <div><div className="font-bold text-yellow-500 font-bold">{r.roomName}</div><div className="text-[10px] text-white/40">Host: {r.hostName}</div></div>
                                    <div className="text-xs font-bold bg-yellow-600 text-black px-4 py-2 rounded-xl shadow-sm font-black">入る</div>
                                </div>
                            ))
                        }
                    </div>
                    <button onClick={()=>setView('modeSelect')} className="text-white/50 text-xs mt-4 text-center underline font-bold">戻る</button>
                </div>
            )}

            {view === 'waiting' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <div className="w-full bg-black/20 rounded-3xl p-8 mb-8 text-center border border-white/5 font-bold">
                        <h2 className="text-xl font-bold mb-6 text-yellow-500 tracking-widest font-black text-center">待機中</h2>
                        <div className="space-y-3">{gameState.players.map((p,i) => <div key={i} className="text-xl font-bold p-3 bg-white/5 rounded-xl border border-white/5">{p.name} {i===0 && '👑'}</div>)}</div>
                    </div>
                    {isHost.current ? <button onClick={startGame} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl active:scale-95 transition font-black">開始！</button> : <p className="animate-pulse text-yellow-500 font-bold font-black text-center">開始待ち...</p>}
                    <button onClick={returnToMenu} className="text-white/30 text-xs mt-10 underline font-bold text-center w-full">退出</button>
                </div>
            )}

            {view === 'game' && (
                <div className="flex flex-col h-full pt-2">
                    <div className="flex flex-wrap justify-center gap-2 mb-4 shrink-0 min-h-[170px] overflow-y-auto">
                        {gameState.players.map((p, i) => (
                            <div key={i} id={`p-card-${i}`} className={`w-[47%] p-2 rounded-2xl border-2 transition-all relative ${gameState.turn === i ? 'p-card-active scale-105' : 'border-transparent p-card-bg'} ${p.isDead ? 'opacity-20' : ''}`}>
                                <div className="font-bold truncate text-[10px] flex justify-between font-black"><span>{p.name}</span><span>{i===0?'👑':''}</span></div>
                                <div className="flex justify-between text-[8px] opacity-70 font-mono font-bold"><span>HP:{p.hp}</span><span>MP:{p.mp}</span></div>
                                <div className="h-1.5 bg-black/40 rounded-full mt-1 overflow-hidden"><div className="h-full bg-green-500 transition-all duration-500" style={{width:p.hp+'%'}}></div></div>
                                <div className="h-1 bg-black/40 rounded-full mt-0.5 overflow-hidden"><div className="h-full bar-mp transition-all duration-500" style={{width:(p.mp * 10)+'%'}}></div></div>
                                {effects.filter(e => e.id === i).map(e => (
                                    <div key={e.key} className={`absolute inset-0 flex items-center justify-center font-black text-2xl z-50 animate-float-up pointer-events-none drop-shadow-lg ${e.type === 'dmg' ? 'text-red-500' : (e.type === 'heal' ? 'text-green-400' : 'text-blue-400')}`}>{e.type === 'dmg' ? '-' : '+'}{e.val}</div>
                                ))}
                                {p.isCPU && !p.isDead && <div className="absolute -top-1 -right-1 bg-stone-600 text-[8px] px-1 rounded-sm border border-stone-400 font-bold">CPU</div>}
                            </div>
                        ))}
                    </div>
                    <div className="bg-[#3e2723] p-4 rounded-2xl h-24 text-xs border-l-4 border-yellow-600 overflow-y-auto mb-4 shrink-0 font-bold" dangerouslySetInnerHTML={{__html: gameState.log}}></div>
                    <div className="grid grid-cols-3 gap-2 overflow-y-auto pb-8">
                        {gameState.players[gameState.turn]?.hand.map((c, i) => {
                            const activePlayer = gameState.players[gameState.turn];
                            const isMyTurn = (mode === 'online' ? activePlayer.peerId === myId.current : !activePlayer.isCPU) && !gameState.winner;
                            const canPay = (activePlayer.mp + (c.mp<0?c.mp:0)) >= 0;
                            return (
                                <button key={i} disabled={!isMyTurn || !canPay} onClick={() => { if(c.atk && !c.multi) setTargetOverlay(i); else if (isHost.current || mode !== 'online') processBattle(gameState.turn, i, gameState.turn); else if(channelRef.current) channelRef.current.send({ type: 'broadcast', event: 'action', payload: { aIdx: gameState.turn, cIdx: i, tIdx: gameState.turn } }); }} className={`h-28 rounded-xl flex flex-col items-center justify-center p-2 text-center card-shadow transition-all ${i<3?'bg-stone-100 text-stone-800':'bg-yellow-100 text-stone-800'} ${(!isMyTurn || !canPay)?'opacity-20 grayscale':''}`}>
                                    <div className="text-[11px] font-black leading-tight mb-1 font-black">{c.name}</div>
                                    <div className="text-[9px] opacity-70 font-bold text-left w-full pl-1 leading-tight font-bold">
                                        {c.name === "きばる" ? "威力: 20 × 2 (ランダム)" : (c.atk > 0 ? `威力: ${c.atk} ` : "")}
                                        {c.heal > 0 && `回復: ${c.heal} `}{c.mpRec > 0 && `MP: +${c.mpRec} `}<br/>命中: {c.acc}%
                                    </div>
                                    <div className="text-[9px] font-bold text-blue-700 mt-1 font-black">消費MP: {c.mp < 0 ? Math.abs(c.mp) : '0'}</div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            )}

            {targetOverlay !== null && (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-6 text-center">
                    <h2 className="text-xl font-bold mb-6 text-yellow-500 font-black">ターゲット選択</h2>
                    <div className="w-full space-y-3 font-bold">{gameState.players.map((p, i) => (!p.isDead && i !== gameState.turn) && (<button key={i} onClick={() => { if (mode !== 'online' || isHost.current) processBattle(gameState.turn, targetOverlay, i); else if(channelRef.current) channelRef.current.send({ type:'ACTION', aIdx:gameState.turn, cIdx:targetOverlay, tIdx:i }); setTargetOverlay(null); }} className="w-full bg-yellow-600 text-black font-bold p-4 rounded-2xl text-lg active:scale-95 transition font-black">{p.name} へ放つ</button>))}<button onClick={()=>setTargetOverlay(null)} className="w-full py-4 text-white/50 text-xs font-bold underline">キャンセル</button></div></div>
            )}

            {gameState.winner && (
                <div className="fixed inset-0 bg-black/80 z-[200] flex flex-col items-center justify-center p-6 text-center backdrop-blur-sm">
                    <div className="text-6xl mb-4 animate-bounce">🏆</div>
                    <h2 className="text-3xl font-black text-yellow-500 mb-2 font-black uppercase italic">Victory!</h2>
                    <p className="text-xl font-bold mb-10 bg-white/10 px-6 py-3 rounded-full border border-yellow-500/30 font-black">Winner: {gameState.winner}</p>
                    <button onClick={returnToMenu} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl font-black">メニューへ戻る</button>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
