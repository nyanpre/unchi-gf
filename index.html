<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCHI GF: Final Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        .bg-toilet { 
            background-color: #4e342e; 
            background-image: radial-gradient(#3e2723 1px, transparent 1px); 
            background-size: 20px 20px; 
        }
        .card-shadow { box-shadow: 0 4px 0 #3e2723; }
        .card-shadow:active:not(.disabled) { box-shadow: none; transform: translateY(4px); }
        .p-card-bg { background: rgba(0, 0, 0, 0.2); }
        .p-card-active { background: rgba(255, 235, 59, 0.15); border-color: #ffeb3b; }
        
        /* エフェクト用アニメーション */
        @keyframes float-up { 
            0% { opacity: 0; transform: translateY(0); } 
            20% { opacity: 1; } 
            100% { opacity: 0; transform: translateY(-60px); } 
        }
        .animate-float-up { animation: float-up 1s forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s 3; }
    </style>
</head>
<body class="bg-toilet text-white font-sans select-none overflow-hidden">
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BASICS = [
    { name: "やわらかうんち", atk: 10, mp: 0, acc: 100, heal: 0, mpRec: 0 },
    { name: "かためうんち", atk: 30, mp: -2, acc: 100, heal: 0, mpRec: 0 },
    { name: "下痢", atk: 30, mp: -1, acc: 50, heal: 0, mpRec: 0 }
];
const RANDOM_POOL = [
    { name: "紙で拭く", atk: 0, mp: -1, acc: 100, heal: 20, mpRec: 0, weight: 20 },
    { name: "きばる", atk: 20, mp: -1, acc: 75, heal: 0, mpRec: 0, multi: 2, weight: 20 },
    { name: "宿便", atk: 50, mp: -3, acc: 75, heal: 0, mpRec: 0, weight: 10 },
    { name: "ペーパー補充", atk: 0, mp: 0, acc: 100, heal: 0, mpRec: 3, weight: 30 },
    { name: "野グソ", atk: 20, mp: 0, acc: 100, heal: 0, mpRec: 2, weight: 15 },
    { name: "しょんべん", atk: 50, mp: -2, acc: 100, heal: 20, mpRec: 0, weight: 5 }
];

function App() {
    const [view, setView] = useState('menu');
    const [mode, setMode] = useState('online'); 
    const [gameState, setGameState] = useState({ players: [], turn: 0, log: "便所へようこそ。", version: 0 });
    const [rooms, setRooms] = useState({});
    const [myName, setMyName] = useState('あらい');
    const [roomName, setRoomName] = useState('あらいの便所');
    const [targetOverlay, setTargetOverlay] = useState(null);
    const [effects, setEffects] = useState([]);

    const gun = useRef(Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gun-ams1.herokuapp.com/gun']));
    const peer = useRef(null);
    const conns = useRef([]);
    const isHost = useRef(false);
    const currentRoomId = useRef(null);

    // エフェクト発動
    const triggerEffect = (id, val, type) => {
        const key = Math.random();
        setEffects(prev => [...prev, { id, val, type, key }]);
        setTimeout(() => setEffects(prev => prev.filter(e => e.key !== key)), 1000);
    };

    // ロビー管理
    useEffect(() => {
        const timer = setInterval(() => {
            gun.current.get('ugf-lobby-final-2026').map().once((data, key) => {
                if (data && Date.now() - data.ts < 30000) { 
                    setRooms(prev => ({ ...prev, [key]: data }));
                } else {
                    setRooms(prev => { const n = {...prev}; delete n[key]; return n; });
                }
            });
        }, 5000);
        return () => clearInterval(timer);
    }, []);

    // 退出処理
    const deleteRoom = () => { if (isHost.current && currentRoomId.current) gun.current.get('ugf-lobby-final-2026').get(currentRoomId.current).put(null); };

    // ゲーム開始
    const startLocalGame = () => {
        setMode('local'); isHost.current = true;
        const pNames = [myName, "ひまだ", "やまさん"];
        const initPlayers = pNames.map(name => ({ name, hp: 100, mp: 5, isDead: false, hand: [...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)], peerId: 'local' }));
        setGameState({ players: initPlayers, turn: 0, log: "ローカル戦開始！", version: 1 });
        setView('game');
    };

    const handleCreateRoom = async () => {
        setMode('online');
        const pid = `ugf-h-${Math.random().toString(36).substring(7)}`;
        if (peer.current) peer.current.destroy();
        peer.current = new Peer(pid);
        peer.current.on('open', () => {
            isHost.current = true; currentRoomId.current = pid;
            gun.current.get('ugf-lobby-final-2026').get(pid).put({ name: roomName, host: myName, hostId: pid, ts: Date.now() });
            setGameState(s => ({ ...s, players: [{ name: myName, hp: 100, mp: 5, isDead: false, hand: [], peerId: pid }] }));
            setView('waiting');
            peer.current.on('connection', conn => { conn.on('open', () => { conns.current.push(conn); conn.on('data', data => handleData(data, conn)); }); });
        });
    };

    const handleJoinRoom = async (room) => {
        setMode('online');
        if (peer.current) peer.current.destroy();
        peer.current = new Peer();
        peer.current.on('open', (myId) => {
            isHost.current = false;
            const conn = peer.current.connect(room.hostId);
            conn.on('open', () => { conns.current = [conn]; conn.send({ type: 'JOIN', name: myName, peerId: myId }); conn.on('data', data => handleData(data, conn)); setView('waiting'); });
        });
    };

    const handleData = (data, conn) => {
        if (isHost.current) {
            if (data.type === 'JOIN') {
                setGameState(prev => {
                    const nextP = [...prev.players, { name: data.name, hp: 100, mp: 5, isDead: false, hand: [], peerId: data.peerId }];
                    const nextS = { ...prev, players: nextP, version: prev.version + 1 };
                    conns.current.forEach(c => c.send({ type: 'SYNC', state: nextS }));
                    return nextS;
                });
            }
            if (data.type === 'ACTION') processBattle(data.aIdx, data.cIdx, data.tIdx);
        } else {
            if (data.type === 'SYNC') {
                setGameState(data.state);
                if (data.eff) triggerEffect(data.eff.id, data.eff.val, data.eff.type);
                if (data.state.version === 1) setView('game');
            }
        }
    };

    const processBattle = (aIdx, cIdx, tIdx) => {
        let s = JSON.parse(JSON.stringify(gameState));
        const attacker = s.players[aIdx];
        const card = attacker.hand[cIdx];
        let log = `【${attacker.name}】の${card.name}！`;

        attacker.mp += card.mp;
        if (card.mpRec > 0) { attacker.mp = Math.min(10, attacker.mp + card.mpRec); triggerEffect(aIdx, card.mpRec, 'mp'); broadcastEffect(aIdx, card.mpRec, 'mp'); }

        if (card.multi) {
            for(let i=0; i<2; i++){
                const targets = s.players.filter((p,idx) => !p.isDead && idx !== aIdx);
                const target = targets[Math.floor(Math.random() * targets.length)];
                const rIdx = s.players.indexOf(target);
                if (Math.random()*100 <= card.acc) {
                    s.players[rIdx].hp -= card.atk; log += `<br>→${target.name}に${card.atk}ダメ`;
                    triggerEffect(rIdx, card.atk, 'dmg'); broadcastEffect(rIdx, card.atk, 'dmg');
                    if(s.players[rIdx].hp <= 0) s.players[rIdx].isDead = true;
                } else { log += `<br>→${target.name}にはスカしっぺ`; triggerEffect(rIdx, 0, 'dmg'); broadcastEffect(rIdx, 0, 'dmg'); }
            }
        } else {
            if (Math.random()*100 <= card.acc) {
                if(card.atk) { s.players[tIdx].hp -= card.atk; log += `${s.players[tIdx].name}に${card.atk}ダメ`; triggerEffect(tIdx, card.atk, 'dmg'); broadcastEffect(tIdx, card.atk, 'dmg'); if(s.players[tIdx].hp<=0) s.players[tIdx].isDead=true; }
                if(card.heal) { attacker.hp = Math.min(100, attacker.hp + card.heal); log += `HP${card.heal}回復`; triggerEffect(aIdx, card.heal, 'heal'); broadcastEffect(aIdx, card.heal, 'heal'); }
            } else { if(card.atk) { triggerEffect(tIdx, 0, 'dmg'); broadcastEffect(tIdx, 0, 'dmg'); } log += `外れた！`; }
        }

        attacker.hand[cIdx] = (cIdx < 3) ? {...BASICS[cIdx]} : RANDOM_POOL.sort(()=>0.5-Math.random())[0];
        let next = aIdx; do { next = (next + 1) % s.players.length; } while (s.players[next].isDead);
        s.turn = next; s.log = log; s.version += 1;
        setGameState(s);
        if (mode === 'online') conns.current.forEach(c => c.send({ type: 'SYNC', state: s }));
    };

    const broadcastEffect = (id, val, type) => { if(mode === 'online' && isHost.current) conns.current.forEach(c => c.send({ type: 'SYNC', state: gameState, eff: {id, val, type} })); };

    const startGame = () => { deleteRoom(); const startS = { ...gameState, players: gameState.players.map(p=>({...p, hand:[...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)]})), version: 1 }; setGameState(startS); conns.current.forEach(c => c.send({ type: 'SYNC', state: startS })); setView('game'); };

    return (
        <div className="max-w-md mx-auto min-h-screen p-4 flex flex-col">
            {view === 'menu' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <h1 className="text-5xl font-black text-yellow-500 mb-12 drop-shadow-lg">UNCHI GF</h1>
                    <div className="w-full space-y-4 text-center">
                        <input value={myName} onChange={e=>setMyName(e.target.value)} className="w-full bg-white/10 p-4 rounded-2xl text-center" placeholder="名前" />
                        <button onClick={startLocalGame} className="w-full bg-white/10 p-4 rounded-2xl font-bold">ローカルで遊ぶ</button>
                        <button onClick={()=>setView('lobby')} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl">オンライン対戦</button>
                    </div>
                </div>
            )}

            {view === 'lobby' && (
                <div className="flex-1 flex flex-col py-6">
                    <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold text-yellow-500">便所一覧</h2><button onClick={()=>setView('menu')} className="text-white/50">戻る</button></div>
                    <div className="bg-white/5 p-4 rounded-2xl mb-6 flex gap-2"><input value={roomName} onChange={e=>setRoomName(e.target.value)} className="flex-1 bg-white/10 p-3 rounded-xl text-sm" placeholder="部屋名" /><button onClick={handleCreateRoom} className="bg-green-600 px-6 py-2 rounded-xl font-bold">作成</button></div>
                    <div className="flex-1 overflow-y-auto space-y-3">
                        {Object.values(rooms).filter(r=>r).length === 0 && <p className="text-center text-white/30 py-10">稼働中の便所はありません</p>}
                        {Object.values(rooms).map(r => r && (<div key={r.hostId} onClick={()=>handleJoinRoom(r)} className="bg-white/10 p-4 rounded-2xl flex justify-between items-center active:scale-95 transition-transform border border-white/5 hover:bg-white/10"><div><div className="font-bold text-yellow-500">{r.name}</div><div className="text-[10px] text-white/40">主: {r.host}</div></div><div className="text-xs font-bold bg-yellow-600 text-black px-3 py-1 rounded-full">参加</div></div>))}
                    </div>
                </div>
            )}

            {view === 'waiting' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <div className="w-full bg-black/20 rounded-3xl p-8 mb-8 text-center border border-white/5"><h2 className="text-xl font-bold mb-6 text-yellow-500">待機中</h2>{gameState.players.map((p,i) => <div key={i} className="text-xl font-bold my-2">{p.name} {i===0 && '👑'}</div>)}</div>
                    {isHost.current ? (<button onClick={startGame} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl">開始！</button>) : <p className="animate-pulse text-yellow-500">親の開始待ち...</p>}
                </div>
            )}

            {view === 'game' && (
                <div className="flex flex-col h-full">
                    <div className="grid grid-cols-2 gap-2 mb-4">
                        {gameState.players.map((p, i) => (
                            <div key={i} id={`p-card-${i}`} className={`p-3 rounded-2xl border-2 transition-all relative ${gameState.turn === i ? 'p-card-active scale-105' : 'border-transparent p-card-bg'} ${p.isDead ? 'opacity-20' : ''}`}>
                                <div className="font-bold truncate text-sm flex justify-between"><span>{p.name}</span><span>{i===0?'👑':''}</span></div>
                                <div className="flex justify-between text-[10px] mt-1 opacity-70"><span>HP:{p.hp}</span><span>MP:{p.mp}</span></div>
                                <div className="h-1.5 bg-black/40 rounded-full mt-1 overflow-hidden"><div className="h-full bg-green-500 transition-all duration-500" style={{width:p.hp+'%'}}></div></div>
                                {effects.filter(e => e.id === i).map(e => (
                                    <div key={e.key} className={`absolute inset-0 flex items-center justify-center font-black text-3xl z-50 animate-float-up pointer-events-none drop-shadow-lg ${e.type === 'dmg' ? 'text-red-500' : (e.type === 'heal' ? 'text-green-400' : 'text-blue-400')}`}>
                                        {e.type === 'dmg' ? '-' : '+'}{e.val}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>
                    {/* メッセージウィンドウを茶色ベース(#3e2723)に修正 */}
                    <div className="bg-[#3e2723] p-4 rounded-2xl h-24 text-xs border-l-4 border-yellow-600 overflow-y-auto mb-4" dangerouslySetInnerHTML={{__html: gameState.log}}></div>
                    <div className="grid grid-cols-3 gap-2">
                        {gameState.players[gameState.turn]?.hand.map((c, i) => {
                            const isMyTurn = mode === 'local' || gameState.players[gameState.turn].peerId === peer.current?.id;
                            const canPay = (gameState.players[gameState.turn].mp + (c.mp<0?c.mp:0)) >= 0;
                            return (
                                <button key={i} disabled={!isMyTurn || !canPay}
                                    onClick={() => { if(c.atk && !c.multi) setTargetOverlay(i); else processBattle(gameState.turn, i, gameState.turn); }}
                                    className={`h-28 rounded-xl flex flex-col items-center justify-center p-2 text-center card-shadow transition-all ${i<3?'bg-stone-100 text-stone-800':'bg-yellow-100 text-stone-800'} ${(!isMyTurn || !canPay)?'opacity-20 grayscale':''}`}>
                                    <div className="text-[11px] font-black leading-tight mb-1">{c.name}</div>
                                    <div className="text-[9px] opacity-70 font-bold">
                                        {c.atk > 0 && `威力: ${c.atk} `}{c.heal > 0 && `回復: ${c.heal} `}{c.mpRec > 0 && `MP: +${c.mpRec} `}<br/>命中: {c.acc}%
                                    </div>
                                    <div className="text-[9px] font-bold text-blue-700 mt-1">消費MP: {c.mp < 0 ? Math.abs(c.mp) : '0'}</div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            )}

            {targetOverlay !== null && (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-6 text-center"><h2 className="text-xl font-bold mb-6 text-yellow-500">誰を攻撃する？</h2><div className="w-full space-y-3">{gameState.players.map((p, i) => (!p.isDead && i !== gameState.turn) && (<button key={i} onClick={() => { if (mode === 'local' || isHost.current) processBattle(gameState.turn, targetOverlay, i); else conns.current[0].send({ type:'ACTION', aIdx:gameState.turn, cIdx:targetOverlay, tIdx:i }); setTargetOverlay(null); }} className="w-full bg-yellow-600 text-black font-bold p-4 rounded-2xl text-lg">{p.name}</button>))}<button onClick={()=>setTargetOverlay(null)} className="w-full py-4 text-white/50 font-bold">戻る</button></div></div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
