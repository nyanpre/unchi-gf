<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCHI GOD FIELD: Lobby</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .unchi-float { animation: float 3s ease-in-out infinite; }
        .bg-toilet { background-color: #2d1b15; background-image: radial-gradient(#3e2723 1px, transparent 1px); background-size: 20px 20px; }
        .card-shadow { box-shadow: 0 4px 0 #999; }
        .card-shadow:active:not(.disabled) { box-shadow: none; transform: translateY(4px); }
    </style>
</head>
<body class="bg-toilet text-white select-none">
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// --- 定数データ ---
const BASICS = [
    { name: "やわらかうんち", atk: 10, mp: 0, acc: 100, heal: 0, mpRec: 0 },
    { name: "かためうんち", atk: 30, mp: -2, acc: 100, heal: 0, mpRec: 0 },
    { name: "下痢", atk: 30, mp: -1, acc: 50, heal: 0, mpRec: 0 }
];
const RANDOM_POOL = [
    { name: "紙で拭く", atk: 0, mp: -1, acc: 100, heal: 20, mpRec: 0, weight: 20 },
    { name: "きばる", atk: 20, mp: -1, acc: 75, heal: 0, mpRec: 0, multi: 2, weight: 20 },
    { name: "宿便", atk: 50, mp: -3, acc: 75, heal: 0, mpRec: 0, weight: 10 },
    { name: "ペーパー補充", atk: 0, mp: 0, acc: 100, heal: 0, mpRec: 3, weight: 30 },
    { name: "野グソ", atk: 20, mp: 0, acc: 100, heal: 0, mpRec: 2, weight: 15 },
    { name: "しょんべん", atk: 50, mp: -2, acc: 100, heal: 20, mpRec: 0, weight: 5 }
];

// --- メインコンポーネント ---
function App() {
    const [view, setView] = useState('menu'); // menu, setup, joinList, waiting, game
    const [mode, setMode] = useState('local');
    const [myName, setMyName] = useState('あらい');
    const [roomName, setRoomName] = useState('');
    const [rooms, setRooms] = useState({}); // ロビーの部屋リスト
    const [players, setPlayers] = useState([]);
    const [turn, setTurn] = useState(0);
    const [log, setLog] = useState('便所へようこそ。');
    const [effects, setEffects] = useState([]);

    const gun = useRef(Gun(['https://gun-manhattan.herokuapp.com/gun']));
    const peer = useRef(null);
    const conns = useRef([]);
    const myId = useRef(Math.random().toString(36).substring(7));

    // ロビー監視
    useEffect(() => {
        gun.current.get('unchi-god-field-rooms').map().on((data, key) => {
            if (data) {
                setRooms(prev => ({ ...prev, [key]: data }));
            } else {
                setRooms(prev => {
                    const newRooms = { ...prev };
                    delete newRooms[key];
                    return newRooms;
                });
            }
        });
    }, []);

    // --- 通信ロジック ---
    const createRoom = () => {
        if (!roomName || !myName) return alert("部屋名と名前を入力してや");
        const hostPeerId = `ugf-${Math.random().toString(36).substring(7)}`;
        peer.current = new Peer(hostPeerId);
        
        peer.current.on('open', () => {
            const roomData = { name: roomName, host: myName, hostId: hostPeerId, players: 1, ts: Date.now() };
            gun.current.get('unchi-god-field-rooms').get(hostPeerId).put(roomData);
            
            setPlayers([{ name: myName.substring(0,8), hp: 100, mp: 5, isDead: false, hand: [] }]);
            setView('waiting');
            setupHostListeners();
        });
    };

    const setupHostListeners = () => {
        peer.current.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'JOIN') {
                    setPlayers(prev => {
                        const newPlayers = [...prev, { name: data.name.substring(0,8), hp: 100, mp: 5, isDead: false, hand: [] }];
                        conns.current.push(conn);
                        // 全員に同期
                        const syncData = { type: 'MEMBER_SYNC', players: newPlayers };
                        conns.current.forEach(c => c.send(syncData));
                        conn.send(syncData);
                        return newPlayers;
                    });
                }
                if (data.type === 'ACTION') handleAction(data);
            });
        });
    };

    const joinRoom = (room) => {
        setRoomName(room.name);
        peer.current = new Peer();
        peer.current.on('open', () => {
            const conn = peer.current.connect(room.hostId);
            conn.on('open', () => {
                conns.current = [conn];
                conn.send({ type: 'JOIN', name: myName });
                setupClientListeners(conn);
                setView('waiting');
            });
        });
    };

    const setupClientListeners = (conn) => {
        conn.on('data', (data) => {
            if (data.type === 'MEMBER_SYNC') setPlayers(data.players);
            if (data.type === 'START') {
                setPlayers(data.players);
                setView('game');
            }
            if (data.type === 'UPDATE') {
                setPlayers(data.players);
                setTurn(data.turn);
                setLog(data.log);
                if (data.eff) triggerEffect(data.eff.id, data.eff.val, data.eff.type);
            }
        });
    };

    const startGame = () => {
        if (players.length < 2) return alert("2人以上必要や");
        // 部屋リストから削除
        gun.current.get('unchi-god-field-rooms').get(peer.current.id).put(null);
        
        const initialPlayers = players.map(p => ({
            ...p,
            hand: [...BASICS, ...drawUniqueRand(3)]
        }));
        setPlayers(initialPlayers);
        conns.current.forEach(c => c.send({ type: 'START', players: initialPlayers }));
        setView('game');
    };

    // --- ゲームロジック用ヘルパー ---
    const drawUniqueRand = (count) => {
        let res = [], pool = [...RANDOM_POOL];
        for(let i=0; i<count; i++) {
            let total = pool.reduce((s,c)=>s+c.weight, 0);
            let r = Math.random()*total, sum=0;
            for(let j=0; j<pool.length; j++) {
                sum += pool[j].weight;
                if(r <= sum) { res.push({...pool[j]}); pool.splice(j,1); break; }
            }
        }
        return res;
    };

    const triggerEffect = (id, val, type) => {
        const key = Math.random();
        setEffects(prev => [...prev, { id, val, type, key }]);
        setTimeout(() => setEffects(prev => prev.filter(e => e.key !== key)), 1000);
    };

    // --- アクション送信（ホスト側が計算） ---
    const sendAction = (cardIdx, targetIdx) => {
        if (peer.current && !conns.current[0]?.open && !isHostRole()) return;
        
        if (isHostRole()) {
            processBattle(players.findIndex(p => p.name === myName), cardIdx, targetIdx);
        } else {
            conns.current[0].send({ type: 'ACTION', cardIdx, targetIdx });
        }
    };

    const isHostRole = () => !peer.current || peer.current.id.includes('host') || players[0].name === myName;

    // バトル計算（ホスト用）
    const processBattle = (pIdx, cardIdx, targetIdx) => {
        const attacker = players[pIdx];
        const card = attacker.hand[cardIdx];
        let newPlayers = JSON.parse(JSON.stringify(players));
        let battleLog = `【${attacker.name}】の${card.name}！ `;

        // MP更新
        newPlayers[pIdx].mp = Math.min(10, Math.max(0, newPlayers[pIdx].mp + card.mp));

        if (card.multi) {
            for(let i=0; i<2; i++) {
                const enemies = newPlayers.filter((p, idx) => !p.isDead && idx !== pIdx);
                const enemy = enemies[Math.floor(Math.random() * enemies.length)];
                const eIdx = newPlayers.findIndex(p => p.name === enemy.name);
                if (Math.random()*100 <= card.acc) {
                    newPlayers[eIdx].hp = Math.max(0, newPlayers[eIdx].hp - card.atk);
                    battleLog += `<br>→ ${enemy.name}に${card.atk}ダメ！`;
                    triggerEffect(eIdx, card.atk, 'dmg');
                    if(newPlayers[eIdx].hp <= 0) newPlayers[eIdx].isDead = true;
                } else {
                    battleLog += `<br>→ ${enemy.name}にはスカしっぺ`;
                    triggerEffect(eIdx, 0, 'dmg');
                }
            }
        } else {
            if (Math.random()*100 <= card.acc) {
                if (card.atk) {
                    newPlayers[targetIdx].hp = Math.max(0, newPlayers[targetIdx].hp - card.atk);
                    triggerEffect(targetIdx, card.atk, 'dmg');
                    battleLog += `${newPlayers[targetIdx].name}に${card.atk}ダメ！`;
                    if(newPlayers[targetIdx].hp <= 0) newPlayers[targetIdx].isDead = true;
                }
                if (card.heal) {
                    newPlayers[pIdx].hp = Math.min(100, newPlayers[pIdx].hp + card.heal);
                    triggerEffect(pIdx, card.heal, 'heal');
                    battleLog += `HP${card.heal}回復！`;
                }
            } else {
                if(card.atk) triggerEffect(targetIdx, 0, 'dmg');
                battleLog += `外れた！`;
            }
        }

        // 手札補充
        if (cardIdx < 3) newPlayers[pIdx].hand[cardIdx] = {...BASICS[cardIdx]};
        else {
            const others = newPlayers[pIdx].hand.filter((_, i) => i >= 3 && i !== cardIdx).map(c => c.name);
            let n; do { n = drawUniqueRand(1)[0]; } while (others.includes(n.name));
            newPlayers[pIdx].hand[cardIdx] = n;
        }

        // ターン終了
        let nextTurn = pIdx;
        do { nextTurn = (nextTurn + 1) % newPlayers.length; } while (newPlayers[nextTurn].isDead);

        setPlayers(newPlayers);
        setTurn(nextTurn);
        setLog(battleLog);

        if (conns.current.length > 0) {
            conns.current.forEach(c => c.send({ type: 'UPDATE', players: newPlayers, turn: nextTurn, log: battleLog }));
        }
    };

    const handleAction = (data) => {
        const attackerIdx = turn;
        processBattle(attackerIdx, data.cardIdx, data.targetIdx);
    };

    // --- サブコンポーネント ---
    const TargetOverlay = ({ onSelect, onCancel }) => (
        <div className="fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center">
            <h2 className="text-2xl mb-6">ターゲットを選べ</h2>
            {players.map((p, i) => (i !== turn && !p.isDead) && (
                <button key={i} onClick={() => onSelect(i)} className="bg-yellow-500 text-black font-bold p-4 m-2 w-64 rounded-xl">
                    {p.name}
                </button>
            ))}
            <button onClick={onCancel} className="mt-8 text-gray-400">戻る</button>
        </div>
    );

    // --- レンダリング ---
    return (
        <div className="max-w-md mx-auto h-screen flex flex-col p-4 relative">
            {view === 'menu' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <div className="text-6xl unchi-float mb-4">💩</div>
                    <h1 className="text-4xl font-black text-yellow-500 mb-8">UNCHI GF</h1>
                    <button onClick={() => setView('setup')} className="bg-yellow-500 text-black font-bold p-4 m-2 w-64 rounded-xl card-shadow">
                        部屋を作る・入る
                    </button>
                    <button onClick={() => { setMode('local'); setView('game'); /* ローカル初期化略 */ }} className="bg-white/10 p-4 m-2 w-64 rounded-xl">
                        ローカルで練習
                    </button>
                </div>
            )}

            {view === 'setup' && (
                <div className="flex-1 flex flex-col items-center justify-center space-y-4">
                    <h2 className="text-2xl font-bold">設定</h2>
                    <input value={myName} onChange={e => setMyName(e.target.value)} placeholder="名前 (最大8文字)" maxLength="8" className="w-full p-4 rounded-xl text-black text-center" />
                    <div className="w-full flex space-x-2">
                        <input value={roomName} onChange={e => setRoomName(e.target.value)} placeholder="部屋名" className="flex-1 p-4 rounded-xl text-black text-center" />
                        <button onClick={createRoom} className="bg-yellow-500 text-black font-bold p-4 rounded-xl">作成</button>
                    </div>
                    <div className="w-full bg-black/30 p-4 rounded-xl min-h-[200px]">
                        <h3 className="text-sm opacity-50 mb-2">公開中の部屋</h3>
                        {Object.values(rooms).map((r, i) => (
                            <div key={i} onClick={() => joinRoom(r)} className="bg-white/10 p-3 mb-2 rounded-lg flex justify-between cursor-pointer hover:bg-white/20">
                                <span>{r.name}</span>
                                <span className="text-xs text-yellow-500">主: {r.host}</span>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => setView('menu')} className="text-gray-400">戻る</button>
                </div>
            )}

            {view === 'waiting' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <h2 className="text-2xl text-yellow-500 mb-4">🚽 便所待機中</h2>
                    <div className="bg-black/40 w-full rounded-2xl p-6 space-y-4">
                        {players.map((p, i) => (
                            <div key={i} className="text-xl font-bold border-b border-white/10 pb-2">
                                {i+1}. {p.name} {i===0 && <span className="text-xs bg-red-500 px-2 py-1 rounded ml-2">親</span>}
                            </div>
                        ))}
                    </div>
                    {isHostRole() ? (
                        <button onClick={startGame} className="bg-yellow-500 text-black font-bold p-4 mt-8 w-full rounded-xl card-shadow">
                            ゲーム開始！
                        </button>
                    ) : (
                        <p className="mt-8 animate-pulse">親が開始するのを待っています...</p>
                    )}
                </div>
            )}

            {view === 'game' && (
                <div className="flex flex-col h-full">
                    {/* プレイヤーグリッド */}
                    <div className="grid grid-cols-2 gap-2 mb-4">
                        {players.map((p, i) => (
                            <div key={i} id={`p-card-${i}`} className={`p-4 rounded-xl border-2 transition-all relative ${turn === i ? 'border-yellow-500 bg-yellow-500/10' : 'border-transparent bg-white/5'} ${p.isDead ? 'opacity-30 grayscale' : ''}`}>
                                <div className="font-bold truncate">{p.name}</div>
                                <div className="text-xs">HP:{p.hp} MP:{p.mp}</div>
                                <div className="h-1 bg-black rounded-full mt-1 overflow-hidden">
                                    <div className="h-full bg-green-500 transition-all" style={{width: p.hp+'%'}}></div>
                                </div>
                                {effects.filter(e => e.id === i).map(e => (
                                    <div key={e.key} className={`absolute inset-0 flex items-center justify-center font-black text-3xl z-10 animate-bounce ${e.type==='dmg'?'text-red-500':'text-green-500'}`}>
                                        {e.type==='dmg'?'-':'+'}{e.val}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </div>

                    {/* ログ */}
                    <div className="bg-black/40 p-4 rounded-xl h-24 overflow-y-auto text-sm border-l-4 border-yellow-500 mb-4" dangerouslySetInnerHTML={{__html: log}}></div>

                    {/* 手札 */}
                    <div className="grid grid-cols-3 gap-2">
                        {players[turn]?.hand.map((c, i) => {
                            const isMyTurn = players[turn].name === myName;
                            const canPay = (players[turn].mp + (c.mp<0?c.mp:0)) >= 0;
                            return (
                                <div key={i} 
                                    onClick={() => {
                                        if(!isMyTurn || !canPay) return;
                                        if(c.atk > 0 && !c.multi) setView('targetSelect_'+i);
                                        else sendAction(i, turn);
                                    }}
                                    className={`h-28 rounded-lg flex flex-col items-center justify-center p-2 text-center card-shadow ${i<3?'bg-white text-black':'bg-yellow-100 text-black'} ${(!isMyTurn || !canPay)?'opacity-40 grayscale':''}`}>
                                    <div className="text-xs font-bold leading-tight">{c.name}</div>
                                    <div className="text-[10px] mt-1">
                                        {c.atk?`攻:${c.atk} `:''}{c.heal?`回:${c.heal} `:''}{c.mpRec?`MP:+${c.mpRec}`:''}
                                    </div>
                                    <div className="text-[9px] mt-1 font-bold text-blue-600">{c.mp < 0 ? `消費:${-c.mp}` : '消費0'}</div>
                                </div>
                            );
                        })}
                    </div>

                    {view.startsWith('targetSelect_') && (
                        <TargetOverlay 
                            onSelect={(t) => { sendAction(parseInt(view.split('_')[1]), t); setView('game'); }}
                            onCancel={() => setView('game')} 
                        />
                    )}
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
