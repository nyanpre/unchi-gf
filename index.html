    <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCHI GF: Toilet Master Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .bg-toilet { background-color: #4e342e; background-image: radial-gradient(#3e2723 1px, transparent 1px); background-size: 20px 20px; }
        .card-shadow { box-shadow: 0 4px 0 #3e2723; }
        .card-shadow:active:not(.disabled) { box-shadow: none; transform: translateY(4px); }
        .p-card-bg { background: rgba(0, 0, 0, 0.2); }
        .p-card-active { background: rgba(255, 235, 59, 0.15); border-color: #ffeb3b; }
        .bar-mp { background-color: #00b0ff; }
        .team-a { border-color: #ef4444 !important; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .team-b { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .badge-a { background-color: #ef4444; }
        .badge-b { background-color: #3b82f6; }
        @keyframes float-up { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-60px); } }
        .animate-float-up { animation: float-up 1s forwards; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s 3; }
        @keyframes unchi-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-unchi-spin { animation: unchi-spin 0.6s linear infinite; }
    </style>
</head>
<body class="bg-toilet text-white font-sans select-none overflow-hidden text-sm font-black">
    <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SUPABASE_URL = 'https://lptcprnbkfvptdaaztwi.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_WTA3ypGwzHGUAtLkSllJvA_EIUDAa1v';

const BASICS = [
    { name: "やわらかうんち", atk: 10, mp: 0, acc: 100, heal: 0, mpRec: 0 },
    { name: "かためうんち", atk: 30, mp: -2, acc: 100, heal: 0, mpRec: 0 },
    { name: "下痢", atk: 30, mp: -1, acc: 50, heal: 0, mpRec: 0 }
];
const RANDOM_POOL = [
    { name: "紙で拭く", atk: 0, mp: -1, acc: 100, heal: 20, mpRec: 0, weight: 20 },
    { name: "きばる", atk: 20, mp: -1, acc: 75, heal: 0, mpRec: 0, multi: 2, weight: 20 },
    { name: "宿便", atk: 50, mp: -3, acc: 75, heal: 0, mpRec: 0, weight: 10 },
    { name: "ペーパー補充", atk: 0, mp: 0, acc: 100, heal: 0, mpRec: 3, weight: 30 },
    { name: "野グソ", atk: 20, mp: 0, acc: 100, heal: 0, mpRec: 2, weight: 15 },
    { name: "しょんべん", atk: 50, mp: -3, acc: 100, heal: 20, mpRec: 0, weight: 5 }
];

function App() {
    const [sb, setSb] = useState(null);
    const [view, setView] = useState('menu');
    const [gameState, setGameState] = useState({ players: [], turn: 0, log: "便所へようこそ。", version: 0, winner: null, battleFormat: '2p' });
    const [rooms, setRooms] = useState({});
    const [myName, setMyName] = useState('プレイヤー1');
    const [localPlayers, setLocalPlayers] = useState([
        { name: 'プレイヤー2', team: 1 }, { name: 'プレイヤー3', team: 0 }, { name: 'プレイヤー4', team: 1 }
    ]);
    const [myTeam, setMyTeam] = useState(0);
    const [battleFormat, setBattleFormat] = useState('2p');
    const [roomName, setRoomName] = useState('');
    const [targetOverlay, setTargetOverlay] = useState(null);
    const [effects, setEffects] = useState([]);
    const [isRefreshing, setIsRefreshing] = useState(false);
    const [mode, setMode] = useState('local');

    const channelRef = useRef(null);
    const lobbyChannelRef = useRef(null);
    const myId = useRef(Math.random().toString(36).substring(7));
    const isHost = useRef(false);

    useEffect(() => {
        const init = () => { if (window.supabase) setSb(window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)); else setTimeout(init, 500); };
        init();
    }, []);

    useEffect(() => {
        if (!sb) return;
        const lobbyChannel = sb.channel('unchi-lobby', { config: { presence: { key: myId.current } } });
        lobbyChannelRef.current = lobbyChannel;
        lobbyChannel.on('presence', { event: 'sync' }, () => {
            const state = lobbyChannel.presenceState();
            const activeRooms = {};
            Object.values(state).forEach(presences => {
                presences.forEach(p => { if (p.isHost) activeRooms[p.hostId] = p; });
            });
            setRooms(activeRooms);
        }).subscribe();
        return () => { lobbyChannel.unsubscribe(); };
    }, [sb]);

    const triggerEffect = (id, val, type) => {
        const key = Math.random();
        setEffects(prev => [...prev, { id, val, type, key }]);
        setTimeout(() => setEffects(prev => prev.filter(e => e.key !== key)), 1000);
    };

    const handleCreateRoom = async () => {
        if (!sb) return alert("準備中...");
        setMode('online'); isHost.current = true;
        const channel = sb.channel(`room-${myId.current}`);
        channelRef.current = channel;
        channel.on('broadcast', { event: 'action' }, ({ payload }) => { if (isHost.current) processBattle(payload.aIdx, payload.cIdx, payload.tIdx); })
            .on('broadcast', { event: 'sync' }, ({ payload }) => {
                if (!isHost.current) {
                    setGameState(payload.state);
                    if (payload.eff) triggerEffect(payload.eff.id, payload.eff.val, payload.eff.type);
                    if (payload.state.version === 1 && view !== 'game') setView('game');
                }
            }).subscribe(async (status) => {
                if (status === 'SUBSCRIBED') {
                    if (lobbyChannelRef.current) await lobbyChannelRef.current.track({ isHost: true, hostName: myName, roomName: roomName || `${myName}の便所`, hostId: myId.current, format: battleFormat });
                    setGameState({ players: [{ name: myName, hp: 100, mp: 5, isDead: false, hand: [], peerId: myId.current, team: myTeam }], turn: 0, log: "参加者を待っています...", version: 0, winner: null, battleFormat: battleFormat });
                    setView('waiting');
                }
            });
    };

    const handleJoinRoom = (room) => {
        setMode('online'); isHost.current = false;
        const channel = sb.channel(`room-${room.hostId}`);
        channelRef.current = channel;
        channel.on('broadcast', { event: 'sync' }, ({ payload }) => {
            setGameState(payload.state);
            if (payload.eff) triggerEffect(payload.eff.id, payload.eff.val, payload.eff.type);
            if (payload.state.version === 1) setView('game');
        }).subscribe((status) => { if (status === 'SUBSCRIBED') { channel.send({ type: 'broadcast', event: 'join', payload: { name: myName, id: myId.current, team: myTeam } }); setView('waiting'); } });
    };

    const processBattle = (aIdx, cIdx, tIdx) => {
        let s = JSON.parse(JSON.stringify(gameState));
        const attacker = s.players[aIdx];
        const card = attacker.hand[cIdx];
        let log = `【${attacker.name}】の${card.name}！`;
        attacker.mp += card.mp;
        if (card.multi) {
            for(let i=0; i<2; i++){
                const targets = s.players.filter((p,idx) => !p.isDead && idx !== aIdx);
                if (targets.length === 0) break;
                const target = targets[Math.floor(Math.random() * targets.length)];
                const rIdx = s.players.indexOf(target);
                if (Math.random()*100 <= card.acc) {
                    s.players[rIdx].hp -= card.atk; log += `<br>→${target.name}に${card.atk}ダメ`;
                    triggerEffect(rIdx, card.atk, 'dmg'); if(s.players[rIdx].hp <= 0) s.players[rIdx].isDead = true;
                } else { log += `<br>→${target.name}にはスカしっぺ`; triggerEffect(rIdx, 0, 'dmg'); }
            }
        } else {
            if (Math.random()*100 <= card.acc) {
                if(card.atk) { s.players[tIdx].hp -= card.atk; log += `${s.players[tIdx].name}に${card.atk}ダメ`; triggerEffect(tIdx, card.atk, 'dmg'); if(s.players[tIdx].hp <= 0) s.players[tIdx].isDead = true; }
                if(card.heal) { attacker.hp = Math.min(100, attacker.hp + card.heal); log += `HP${card.heal}回復`; triggerEffect(aIdx, card.heal, 'heal'); }
            } else { if(card.atk) triggerEffect(tIdx, 0, 'dmg'); log += `外れた！`; }
        }
        if (s.battleFormat === '2v2') {
            const teamADead = s.players.filter(p => p.team === 0 && !p.isDead).length === 0;
            const teamBDead = s.players.filter(p => p.team === 1 && !p.isDead).length === 0;
            if (teamADead) s.winner = "Bチーム"; else if (teamBDead) s.winner = "Aチーム";
        } else {
            const alive = s.players.filter(p => !p.isDead);
            if (alive.length === 1) s.winner = alive[0].name;
        }
        if (!s.winner) {
            attacker.hand[cIdx] = (cIdx < 3) ? {...BASICS[cIdx]} : RANDOM_POOL[Math.floor(Math.random()*RANDOM_POOL.length)];
            let next = aIdx; do { next = (next + 1) % s.players.length; } while (s.players[next].isDead);
            s.turn = next;
        }
        s.log = log; s.version += 1;
        setGameState(s);
        if (mode === 'online' && channelRef.current) channelRef.current.send({ type: 'broadcast', event: 'sync', payload: { state: s } });
    };

    const startGame = () => { if (lobbyChannelRef.current) lobbyChannelRef.current.untrack(); const startS = { ...gameState, players: gameState.players.map(p=>({...p, hand:[...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)]})), version: 1, winner: null }; setGameState(startS); if (channelRef.current) channelRef.current.send({ type: 'broadcast', event: 'sync', payload: { state: startS } }); setView('game'); };
    const startLocalGame = () => { setMode('local'); const count = battleFormat === '2v2' ? 4 : parseInt(battleFormat); const players = [{ name: myName, hp: 100, mp: 5, isDead: false, team: myTeam, peerId: 'local0' }]; for (let i = 0; i < count - 1; i++) { players.push({ name: localPlayers[i].name || `プレイヤー${i+2}`, hp: 100, mp: 5, isDead: false, team: localPlayers[i].team, peerId: `local${i+1}` }); } setGameState({ players: players.map(p=>({...p, hand:[...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)]})), turn: 0, log: "ローカル戦開始！", version: 1, winner: null, battleFormat }); setView('game'); };
    const startCPUMame = () => { setMode('cpu'); const count = battleFormat === '2v2' ? 4 : parseInt(battleFormat); const players = [{ name: myName, hp: 100, mp: 5, isDead: false, team: 0, peerId: 'me', isCPU: false }]; for (let i = 1; i < count; i++) { const cpuTeam = battleFormat === '2v2' ? (i % 2) : i; players.push({ name: `CPU_${i}`, hp: 100, mp: 5, isDead: false, team: cpuTeam, peerId: `cpu${i}`, isCPU: true }); } setGameState({ players: players.map(p=>({...p, hand:[...BASICS, ...RANDOM_POOL.sort(()=>0.5-Math.random()).slice(0,3)]})), turn: 0, log: "CPU戦開始！", version: 1, winner: null, battleFormat }); setView('game'); };
    const returnToMenu = () => { if (channelRef.current && sb) sb.removeChannel(channelRef.current); if (lobbyChannelRef.current) lobbyChannelRef.current.untrack(); setGameState({ players: [], turn: 0, log: "便所へようこそ。", version: 0, winner: null }); setView('modeSelect'); };

    return (
        <div className="max-w-md mx-auto min-h-screen p-4 flex flex-col relative overflow-hidden">
            {view === 'menu' && (
                <div className="flex-1 flex flex-col items-center justify-center">
                    <h1 className="text-5xl font-black text-yellow-500 mb-12 drop-shadow-lg">UNCHI GF</h1>
                    <div className="w-full space-y-6 text-center"><input value={myName} onChange={e=>setMyName(e.target.value)} className="w-full bg-white/10 p-4 rounded-2xl text-center text-xl font-bold border-2 border-white/5 font-black" maxLength="8" /><button onClick={() => setView('modeSelect')} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl font-black">次へ</button></div>
                </div>
            )}
            {view === 'modeSelect' && (
                <div className="flex-1 flex flex-col items-center justify-center font-black">
                    <h2 className="text-2xl font-bold text-yellow-500 mb-8 text-center uppercase tracking-widest font-black">トイレ選択</h2>
                    <div className="w-full space-y-4 font-black">
                        <button onClick={() => setView('localSetup')} className="w-full bg-white/10 p-5 rounded-2xl font-bold text-xl transition active:scale-95">ローカルでトイレ</button>
                        <button onClick={() => setView('cpuSetup')} className="w-full bg-stone-600 p-5 rounded-2xl font-bold text-xl transition active:scale-95">CPUとトイレ</button>
                        <button onClick={() => { setRoomName(`${myName}の便所`); setView('lobby'); }} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl transition active:scale-95">オンライントイレ</button>
                        <button onClick={() => setView('menu')} className="text-white/50 text-xs mt-6 underline w-full text-center font-bold">名前を変更</button>
                    </div>
                </div>
            )}
            {view === 'localSetup' && (
                <div className="flex-1 flex flex-col items-center py-4 font-black text-center">
                    <h1 className="text-2xl font-black text-yellow-500 mb-6 font-bold">💩 ローカル設定</h1>
                    <div className="w-full space-y-4 text-center">
                        <div className="bg-white/5 p-4 rounded-xl border border-white/5">形式：<select value={battleFormat} onChange={e => setBattleFormat(e.target.value)} className="bg-[#3e2723] p-2 rounded-lg ml-2 font-bold"><option value="2p">2人</option><option value="3p">3人</option><option value="4p">4人(うんちロワイヤル)</option><option value="2v2">4人(チーム戦)</option></select></div>
                        <div className="space-y-2 max-h-[30vh] overflow-y-auto pr-1">{Array.from({length: (battleFormat==='2v2'?4:parseInt(battleFormat))}).map((_, i) => (
                            <div key={i} className="flex items-center gap-2">
                                <input value={i===0?myName:localPlayers[i-1].name} onChange={e => { if(i>0) { let c = [...localPlayers]; c[i-1].name = e.target.value; setLocalPlayers(c); } }} disabled={i===0} className={`flex-1 bg-white/10 p-3 rounded-xl text-center font-bold ${i===0?'opacity-30':''}`} />
                                {battleFormat === '2v2' && <button onClick={()=>{ if(i===0) setMyTeam(myTeam===0?1:0); else { let c = [...localPlayers]; c[i-1].team = c[i-1].team===0?1:0; setLocalPlayers(c); } }} className={`w-20 p-3 rounded-xl font-black text-xs ${(i===0?myTeam:localPlayers[i-1].team)===0?'badge-a':'badge-b'}`}>Team {(i===0?myTeam:localPlayers[i-1].team)===0?'A':'B'}</button>}
                            </div>
                        ))}</div>
                        <button onClick={startLocalGame} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-2xl font-black mt-4">トイレに行く</button>
                        <button onClick={() => setView('modeSelect')} className="text-white/50 text-xs mt-4 underline font-bold">戻る</button>
                    </div>
                </div>
            )}
            {view === 'cpuSetup' && (
                <div className="flex-1 flex flex-col items-center justify-center p-4 font-black">
                    <h1 className="text-2xl font-black text-yellow-500 mb-6 font-bold">💩 CPU戦設定</h1>
                    <div className="w-full space-y-6 text-center">
                        <div className="bg-white/5 p-6 rounded-2xl border border-white/5 font-bold">形式：<select value={battleFormat} onChange={e => setBattleFormat(e.target.value)} className="bg-[#3e2723] p-2 rounded-lg ml-2 font-bold"><option value="2p">2人</option><option value="3p">3人</option><option value="4p">4人(うんちロワイヤル)</option><option value="2v2">4人(チーム戦)</option></select></div>
                        <button onClick={startCPUMame} className="w-full bg-stone-100 text-stone-900 font-bold p-5 rounded-2xl card-shadow text-2xl font-black">トイレに行く</button>
                        <button onClick={() => setView('modeSelect')} className="text-white/50 text-xs mt-4 underline font-bold">戻る</button>
                    </div>
                </div>
            )}
            {view === 'lobby' && (
                <div className="flex-1 flex flex-col py-6 font-black">
                    <div className="flex justify-between items-end mb-6"><h2 className="text-2xl font-bold text-yellow-500 uppercase tracking-widest">便所一覧</h2><button onClick={()=>{setIsRefreshing(true); setTimeout(()=>setIsRefreshing(false), 1000);}} className="bg-[#3e2723] border border-yellow-600 px-4 py-2 rounded-xl text-xs flex items-center gap-3 active:scale-95 transition shadow-sm"><span className={`text-2xl ${isRefreshing ? 'animate-unchi-spin' : ''}`}>💩</span><span>捜索</span></button></div>
                    <div className="bg-white/5 p-4 rounded-2xl mb-6 space-y-3 border border-white/5 text-center shadow-inner">
                        <select value={battleFormat} onChange={e => setBattleFormat(e.target.value)} className="w-full bg-[#3e2723] p-2 rounded-lg mb-2 font-bold text-xs text-center"><option value="2p">2人</option><option value="3p">3人</option><option value="4p">4人(うんちロワイヤル)</option><option value="2v2">4人(チーム戦)</option></select>
                        <input value={roomName} onChange={e=>setRoomName(e.target.value)} className="w-full bg-white/10 p-3 rounded-xl text-sm text-center font-bold outline-none" placeholder="部屋名を入力" />
                        <div className="flex flex-col gap-2 mt-2">
                            <button onClick={handleCreateRoom} className="w-full bg-green-600 p-3 rounded-xl font-bold card-shadow font-black text-white">部屋を作る</button>
                            {/* オンラインロビーの戻るボタンを追加 */}
                            <button onClick={() => setView('modeSelect')} className="w-full py-2 text-white/50 text-xs font-bold underline active:scale-95 transition">トイレ選択に戻る</button>
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-3 pr-1">{Object.values(rooms).length === 0 ? <div className="text-center py-10 opacity-30 italic font-bold">稼働中の便所はありません</div> : 
                        Object.values(rooms).map(r => (
                            <div key={r.hostId} onClick={()=>handleJoinRoom(r)} className="bg-white/10 p-4 rounded-2xl flex justify-between items-center active:bg-white/20 border border-white/5 transition-all">
                                <div><div className="font-bold text-yellow-500">{r.roomName}</div><div className="text-[10px] text-white/40 font-bold">{r.format === '2v2' ? 'チーム戦' : (r.format==='4p'?'ロワイヤル':r.format)} / 主: {r.hostName}</div></div>
                                <div className="text-xs font-bold bg-yellow-600 text-black px-4 py-2 rounded-xl shadow-sm font-black">入る</div>
                            </div>
                        ))
                    }</div>
                </div>
            )}
            {view === 'waiting' && (
                <div className="flex-1 flex flex-col items-center justify-center font-black text-center">
                    <div className="w-full bg-black/20 rounded-3xl p-8 mb-8 text-center border border-white/5 font-bold"><h2 className="text-xl font-bold mb-6 text-yellow-500 tracking-widest uppercase italic font-black">待機中</h2>
                        <div className="space-y-3">{gameState.players.map((p,i) => (
                            <div key={i} className="flex items-center gap-2 p-3 bg-white/5 rounded-xl border border-white/5"><div className="flex-1 text-xl font-bold text-left font-black">{p.name} {i===0 && '👑'}</div>
                                {gameState.battleFormat === '2v2' && <button disabled={mode === 'online' && p.peerId !== myId.current} onClick={() => { if(mode === 'online') { changeOnlineTeam(p.team === 0 ? 1 : 0); } else { setGameState(prev => { let c = [...prev.players]; c[i].team = c[i].team===0?1:0; return {...prev, players:c}; }); } }} className={`px-3 py-1 rounded font-black text-xs ${p.team === 0 ? 'badge-a' : 'badge-b'}`}>Team {p.team === 0 ? 'A' : 'B'}</button>}
                            </div>
                        ))}</div>
                    </div>
                    {isHost.current ? <button onClick={startGame} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-2xl font-black">トイレに行く</button> : <p className="animate-pulse text-yellow-500 font-bold font-black">主がトイレに行くのを待っています...</p>}
                    <button onClick={returnToMenu} className="text-white/30 text-xs mt-10 underline font-bold uppercase">退出する</button>
                </div>
            )}
            {view === 'game' && (
                <div className="flex flex-col h-full pt-2 font-black">
                    <div className="flex flex-wrap justify-center gap-2 mb-4 shrink-0 min-h-[170px] overflow-y-auto">
                        {gameState.players.map((p, i) => (
                            <div key={i} className={`w-[47%] p-2 rounded-2xl border-2 transition-all relative ${gameState.turn === i ? 'p-card-active scale-105' : 'border-transparent p-card-bg'} ${p.isDead ? 'opacity-20' : ''} ${gameState.battleFormat === '2v2' ? (p.team === 0 ? 'team-a' : 'team-b') : ''}`}>
                                <div className="font-bold truncate text-[10px] flex justify-between font-black"><span>{p.name}</span><span>{i===0?'👑':''}</span></div>
                                <div className="flex justify-between text-[8px] opacity-70 font-mono font-bold tracking-tighter"><span>HP:{p.hp}</span><span>MP:{p.mp}</span></div>
                                <div className="h-1.5 bg-black/40 rounded-full mt-1 overflow-hidden"><div className="h-full bg-green-500 transition-all duration-500" style={{width:p.hp+'%'}}></div></div>
                                <div className="h-1 bg-black/40 rounded-full mt-0.5 overflow-hidden"><div className="h-full bar-mp transition-all duration-500" style={{width:(p.mp * 10)+'%'}}></div></div>
                                {effects.filter(e => e.id === i).map(e => (<div key={e.key} className={`absolute inset-0 flex items-center justify-center font-black text-2xl z-50 animate-float-up pointer-events-none drop-shadow-lg ${e.type === 'dmg' ? 'text-red-500' : (e.type === 'heal' ? 'text-green-400' : 'text-blue-400')}`}>{e.type === 'dmg' ? '-' : '+'}{e.val}</div>))}
                                {gameState.battleFormat === '2v2' && <div className={`absolute -top-1 -left-1 text-[8px] px-1 rounded-full font-black ${p.team===0?'badge-a':'badge-b'}`}>{p.team===0?'A':'B'}</div>}
                                {p.isCPU && !p.isDead && <div className="absolute -top-1 -right-1 bg-stone-600 text-[8px] px-1 rounded-sm border border-stone-400 font-bold uppercase italic font-black">CPU</div>}
                            </div>
                        ))}
                    </div>
                    <div className="bg-[#3e2723] p-4 rounded-2xl h-24 text-xs border-l-4 border-yellow-600 overflow-y-auto mb-4 shrink-0 font-bold" dangerouslySetInnerHTML={{__html: gameState.log}}></div>
                    <div className="grid grid-cols-3 gap-2 overflow-y-auto pb-8">
                        {gameState.players[gameState.turn]?.hand.map((c, i) => {
                            const activePlayer = gameState.players[gameState.turn];
                            const isMyTurn = (mode === 'online' ? activePlayer.peerId === myId.current : !activePlayer.isCPU) && !gameState.winner;
                            const canPay = (activePlayer.mp + (c.mp<0?c.mp:0)) >= 0;
                            return (
                                <button key={i} disabled={!isMyTurn || !canPay} onClick={() => { if(c.atk && !c.multi) setTargetOverlay(i); else if (isHost.current || mode !== 'online') processBattle(gameState.turn, i, gameState.turn); else if(channelRef.current) channelRef.current.send({ type: 'broadcast', event: 'action', payload: { aIdx: gameState.turn, cIdx: i, tIdx: gameState.turn } }); }} className={`h-28 rounded-xl flex flex-col items-center justify-center p-2 text-center card-shadow transition-all ${i<3?'bg-stone-100 text-stone-800':'bg-yellow-100 text-stone-800'} ${(!isMyTurn || !canPay)?'opacity-20 grayscale':''}`}>
                                    <div className="text-[11px] font-black leading-tight mb-1 font-black">{c.name}</div>
                                    <div className="text-[9px] opacity-70 font-bold text-left w-full pl-1 leading-tight font-bold">{c.name === "きばる" ? "威力: 20 × 2 (ランダム)" : (c.atk > 0 ? `威力: ${c.atk} ` : "")}{c.heal > 0 && `回復: ${c.heal} `}{c.mpRec > 0 && `MP: +${c.mpRec} `}<br/>命中: {c.acc}%</div>
                                    <div className="text-[9px] font-bold text-blue-700 mt-1 uppercase tracking-tighter font-black">MP: {c.mp < 0 ? Math.abs(c.mp) : '0'}</div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            )}
            {targetOverlay !== null && (
                <div className="fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center p-6 text-center animate-in fade-in font-black"><h2 className="text-xl font-bold mb-6 text-yellow-500 uppercase tracking-widest italic font-black">ターゲット選択</h2>
                    <div className="w-full space-y-3 font-bold max-h-[70vh] overflow-y-auto px-2 font-black">{gameState.players.map((p, i) => (!p.isDead && i !== gameState.turn) && (<button key={i} onClick={() => { if (mode !== 'online' || isHost.current) processBattle(gameState.turn, targetOverlay, i); else if(channelRef.current) channelRef.current.send({ type:'ACTION', aIdx:gameState.turn, cIdx:targetOverlay, tIdx:i }); setTargetOverlay(null); }} className={`w-full p-4 rounded-2xl text-lg active:scale-95 transition border-2 ${gameState.battleFormat === '2v2' ? (p.team === 0 ? 'border-red-500 bg-red-900/40' : 'border-blue-500 bg-blue-900/40') : 'bg-yellow-600 text-black border-transparent font-black'}`}>{p.name} {gameState.battleFormat === '2v2' ? `(Team ${p.team===0?'A':'B'})` : ''}</button>))}<button onClick={()=>setTargetOverlay(null)} className="w-full py-4 text-white/50 text-xs font-bold underline font-black">キャンセル</button></div>
                </div>
            )}
            {gameState.winner && (
                <div className="fixed inset-0 bg-black/95 z-[200] flex flex-col items-center justify-center p-6 text-center backdrop-blur-md animate-in zoom-in duration-500 font-black">
                    <div className="text-6xl mb-4 animate-bounce font-black">🏆</div>
                    <h2 className="text-3xl font-black text-yellow-500 mb-2 uppercase italic font-black">勝負あり！</h2>
                    <p className={`text-2xl font-black mb-2 ${gameState.winner.includes('A') ? 'text-red-400' : (gameState.winner.includes('B') ? 'text-blue-400' : 'text-yellow-400')}`}>{gameState.winner}の勝利！</p>
                    {gameState.battleFormat === '2v2' && (
                        <div className="text-xs font-bold opacity-80 mb-10 bg-white/5 px-6 py-2 rounded-full border border-white/10 italic font-black">
                            参加者: {gameState.players.filter(p => (gameState.winner === "Aチーム" || gameState.winner === "Aチームの勝利" ? p.team === 0 : p.team === 1)).map(p => p.name).join(' & ')}
                        </div>
                    )}
                    <button onClick={returnToMenu} className="w-full bg-yellow-600 text-black font-bold p-5 rounded-2xl card-shadow text-xl shadow-lg uppercase active:translate-y-1 transition-all font-black">メニューへ戻る</button>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
