<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNCHI GOD FIELD: 究極便所</title>
    <style>
        :root { --bg: #2d1b15; --card-base: #efebe9; --card-rand: #fff9c4; --accent: #ffc107; --mp: #00b0ff; --hp: #66bb6a; --dmg: #ff5252; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; overflow: hidden; }
        .container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; position: relative; height: 100vh; }
        
        #setup-screen { background: var(--bg); position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-group { margin: 15px 0; width: 100%; text-align: center; }
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; margin: 5px; font-size: 16px; }
        select { padding: 10px; border-radius: 5px; font-size: 16px; }

        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .p-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 2px solid transparent; transition: 0.3s; position: relative; }
        .p-card.active { border-color: var(--accent); background: rgba(255,193,7,0.1); }
        .p-card.dead { opacity: 0.2; filter: grayscale(1); }
        .bar-outer { background: #111; height: 6px; border-radius: 3px; margin: 4px 0; }
        .bar-hp { height: 100%; background: var(--hp); transition: 0.5s; border-radius: 3px; }
        .bar-mp { height: 100%; background: var(--mp); transition: 0.5s; border-radius: 3px; }

        .log { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px; height: 70px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; border-left: 4px solid var(--accent); }
        .hand { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .card { height: 110px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; padding: 5px; text-align: center; border: none; box-shadow: 0 4px #999; }
        .card.base { background: var(--card-base); color: #3e2723; }
        .card.rand { background: var(--card-rand); color: #3e2723; }
        .card.disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; box-shadow: none; transform: translateY(4px); }
        .card:active:not(.disabled) { box-shadow: none; transform: translateY(4px); }
        
        .c-name { font-weight: bold; font-size: 12px; margin-bottom: 4px; border-bottom: 1px solid rgba(0,0,0,0.1); width: 90%; }
        .c-detail { font-size: 10px; line-height: 1.2; text-align: left; width: 100%; padding-left: 5px; }
        .c-mp-cost { font-size: 11px; font-weight: bold; margin-top: 5px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .target-btn { background: var(--accent); border: none; padding: 15px; margin: 8px; border-radius: 10px; font-weight: bold; width: 220px; font-size: 18px; }
        
        .start-btn { background: var(--accent); border: none; padding: 15px 60px; border-radius: 30px; font-weight: bold; font-size: 20px; margin-top: 20px; }

        /* エフェクト用アニメーション */
        @keyframes float-up { 0% { opacity:0; transform: translateY(0); } 20% { opacity:1; } 100% { opacity:0; transform: translateY(-50px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .effect-num { position: absolute; font-weight: bold; font-size: 24px; pointer-events: none; z-index: 10; text-shadow: 2px 2px 0 #000; animation: float-up 1s forwards; }
        .shake { animation: shake 0.2s 3; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h1 style="color:var(--accent)">💩 便所・ゴッドフィールド</h1>
    <div class="input-group">
        <select id="p-count" onchange="updateInputs()">
            <option value="2">2人対戦</option><option value="3" selected>3人対戦</option><option value="4">4人対戦</option>
        </select>
    </div>
    <div id="name-list" class="input-group">
        <input type="text" id="in0" value="あらい"><input type="text" id="in1" value="ひまだ">
        <input type="text" id="in2" value="やまさん"><input type="text" id="in3" value="さく" style="display:none">
    </div>
    <button class="start-btn" onclick="initGame()">開戦</button>
</div>

<div class="container">
    <div class="player-grid" id="p-grid"></div>
    <div class="log" id="log-box">便所へようこそ。</div>
    <div class="hand" id="hand-view"></div>
</div>

<div class="overlay" id="target-ui">
    <h2 id="target-msg">誰に放つ？</h2>
    <div id="target-list"></div>
    <button onclick="closeTarget()" style="background:none; color:white; border:1px solid white; margin-top:30px; padding:10px 20px; border-radius:5px;">戻る</button>
</div>

<script>
    const BASICS = [
        { name: "やわらかうんち", atk: 10, mp: 0, acc: 100, heal: 0, mpRec: 0, desc: "基本の攻撃" },
        { name: "かためうんち", atk: 30, mp: -2, acc: 100, heal: 0, mpRec: 0, desc: "重い一撃" },
        { name: "下痢", atk: 30, mp: -1, acc: 50, heal: 0, mpRec: 0, desc: "半分外れる" }
    ];

    const RANDOM_POOL = [
        { name: "紙で拭く", atk: 0, mp: -1, acc: 100, heal: 20, mpRec: 0, weight: 20 },
        { name: "きばる", atk: 20, mp: -1, acc: 75, heal: 0, mpRec: 0, multi: 2, weight: 20 },
        { name: "宿便", atk: 50, mp: -3, acc: 75, heal: 0, mpRec: 0, weight: 10 },
        { name: "ペーパー補充", atk: 0, mp: 0, acc: 100, heal: 0, mpRec: 3, weight: 30 },
        { name: "野グソ", atk: 20, mp: 0, acc: 100, heal: 0, mpRec: 2, weight: 15 },
        { name: "しょんべん", atk: 50, mp: -2, acc: 100, heal: 20, mpRec: 0, weight: 5 }
    ];

    let players = [];
    let turn = 0;
    let selectedHandIdx = null;

    function updateInputs() {
        const count = document.getElementById('p-count').value;
        for(let i=0; i<4; i++) document.getElementById('in'+i).style.display = i < count ? 'inline-block' : 'none';
    }

    function initGame() {
        const count = parseInt(document.getElementById('p-count').value);
        players = [];
        for(let i=0; i<count; i++) {
            players.push({
                id: i, name: document.getElementById('in'+i).value || `P${i+1}`,
                hp: 100, mp: 5, isDead: false,
                hand: [...BASICS, ...drawUniqueRand(3)]
            });
        }
        document.getElementById('setup-screen').style.display = 'none';
        render();
    }

    function drawUniqueRand(count) {
        let results = [];
        let pool = [...RANDOM_POOL];
        for(let i=0; i<count; i++) {
            let totalWeight = pool.reduce((s, c) => s + c.weight, 0);
            let rand = Math.random() * totalWeight;
            let sum = 0;
            for(let j=0; j<pool.length; j++) {
                sum += pool[j].weight;
                if(rand <= sum) {
                    results.push({...pool[j]});
                    pool.splice(j, 1); // 選ばれたカードを除去して重複を防ぐ
                    break;
                }
            }
        }
        return results;
    }

    function render() {
        const grid = document.getElementById('p-grid');
        grid.innerHTML = players.map((p, i) => `
            <div id="p-card-${i}" class="p-card ${i === turn ? 'active' : ''} ${p.isDead ? 'dead' : ''}">
                <strong>${p.name}</strong><br>
                HP:${p.hp} MP:${p.mp}
                <div class="bar-outer"><div class="bar-hp" style="width:${p.hp}%"></div></div>
                <div class="bar-outer"><div class="bar-mp" style="width:${p.mp*10}%"></div></div>
            </div>
        `).join('');

        const handView = document.getElementById('hand-view');
        handView.innerHTML = players[turn].hand.map((c, i) => {
            const canPay = (players[turn].mp + (c.mp < 0 ? c.mp : 0)) >= 0;
            return `
                <div class="card ${i < 3 ? 'base' : 'rand'} ${canPay ? '' : 'disabled'}" onclick="handleCard(${i})">
                    <div class="c-name">${c.name}</div>
                    <div class="c-detail">
                        ${c.atk > 0 ? `威力: ${c.atk}<br>` : ''}
                        ${c.heal > 0 ? `回復: ${c.heal}<br>` : ''}
                        ${c.mpRec > 0 ? `MP: +${c.mpRec}<br>` : ''}
                        命中: ${c.acc}%
                    </div>
                    <div class="c-mp-cost" style="color:${c.mp < 0 ? '#d32f2f' : '#333'}">
                        ${c.mp < 0 ? `消費MP: ${Math.abs(c.mp)}` : 'MP消費なし'}
                    </div>
                </div>
            `;
        }).join('');
    }

    function handleCard(idx) {
        const card = players[turn].hand[idx];
        if((players[turn].mp + (card.mp < 0 ? card.mp : 0)) < 0) return;
        selectedHandIdx = idx;
        if(card.atk > 0 && !card.multi) openTarget();
        else executeCard(turn);
    }

    function openTarget() {
        document.getElementById('target-ui').style.display = 'flex';
        const list = document.getElementById('target-list');
        list.innerHTML = players.map((p, i) => 
            (i !== turn && !p.isDead) ? `<button class="target-btn" onclick="executeCard(${i})">${p.name}</button>` : ''
        ).join('');
    }

    function closeTarget() { document.getElementById('target-ui').style.display = 'none'; }

    function showEffect(pId, val, type) {
        const card = document.getElementById(`p-card-${pId}`);
        const el = document.createElement('div');
        el.className = 'effect-num';
        el.style.color = type === 'dmg' ? 'var(--dmg)' : (type === 'heal' ? 'var(--hp)' : 'var(--mp)');
        el.style.left = (20 + Math.random() * 50) + '%';
        el.style.top = (20 + Math.random() * 40) + '%';
        el.innerText = (type === 'dmg' ? '-' : '+') + val;
        card.appendChild(el);
        if(type === 'dmg') {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 600);
        }
        setTimeout(() => el.remove(), 1000);
    }

    function executeCard(targetIdx) {
        const attacker = players[turn];
        const card = attacker.hand[selectedHandIdx];
        closeTarget();

        attacker.mp = Math.min(10, Math.max(0, attacker.mp + card.mp));
        let logMsg = `【${attacker.name}】の${card.name}！ `;

        if(card.mpRec > 0) {
            attacker.mp = Math.min(10, attacker.mp + card.mpRec);
            showEffect(turn, card.mpRec, 'mp');
        }

        if(card.multi) {
            for(let k=0; k<card.multi; k++) {
                const enemies = players.filter((p, i) => !p.isDead && i !== turn);
                const randomEnemy = enemies[Math.floor(Math.random() * enemies.length)];
                if(Math.random() * 100 <= card.acc) {
                    randomEnemy.hp = Math.max(0, randomEnemy.hp - card.atk);
                    showEffect(randomEnemy.id, card.atk, 'dmg');
                    if(randomEnemy.hp <= 0) randomEnemy.isDead = true;
                }
            }
        } else {
            if(Math.random() * 100 <= card.acc) {
                if(card.atk > 0) {
                    players[targetIdx].hp = Math.max(0, players[targetIdx].hp - card.atk);
                    showEffect(targetIdx, card.atk, 'dmg');
                    if(players[targetIdx].hp <= 0) players[targetIdx].isDead = true;
                }
                if(card.heal > 0) {
                    attacker.hp = Math.min(100, attacker.hp + card.heal);
                    showEffect(turn, card.heal, 'heal');
                }
            } else { logMsg += `スカ！`; }
        }

        document.getElementById('log-box').innerHTML = logMsg;
        
        // 補充ロジック：ランダム枠のみ重複無しで引き直し
        if(selectedHandIdx < 3) {
            attacker.hand[selectedHandIdx] = {...BASICS[selectedHandIdx]};
        } else {
            // 現在持っている他の2枚のランダムカードを把握
            const otherRandNames = attacker.hand.filter((_, i) => i >= 3 && i !== selectedHandIdx).map(c => c.name);
            let newCard;
            do {
                newCard = drawUniqueRand(1)[0];
            } while (otherRandNames.includes(newCard.name));
            attacker.hand[selectedHandIdx] = newCard;
        }

        if(checkWin()) setTimeout(nextTurn, 1500);
    }

    function nextTurn() {
        do { turn = (turn + 1) % players.length; } while (players[turn].isDead);
        render();
    }

    function checkWin() {
        const alive = players.filter(p => !p.isDead);
        if(alive.length === 1) {
            document.getElementById('log-box').innerHTML = `<strong>勝者：${alive[0].name}！</strong>`;
            setTimeout(() => { alert("優勝：" + alive[0].name); location.reload(); }, 2000);
            return false;
        }
        return true;
    }
    updateInputs();
</script>
</body>
</html>
