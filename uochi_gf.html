<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ウンチ・ゴッドフィールド</title>
    <style>
        body { font-family: sans-serif; background: #5d4037; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 600px; margin: auto; background: #8d6e63; padding: 20px; border-radius: 15px; border: 5px solid #3e2723; }
        .player-area { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .player { padding: 10px; border: 2px solid transparent; border-radius: 10px; background: rgba(0,0,0,0.2); width: 30%; }
        .player.active { border-color: #ffeb3b; background: rgba(255, 235, 59, 0.2); transform: scale(1.05); }
        .hp-bar { height: 10px; background: #4caf50; border-radius: 5px; margin-top: 5px; transition: width 0.3s; }
        .hand { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; min-height: 100px; }
        .card { width: 80px; height: 110px; background: #fff; color: #333; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; border: 2px solid #ccc; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .log { background: #3e2723; height: 120px; overflow-y: auto; margin-top: 20px; padding: 10px; font-size: 14px; text-align: left; border-radius: 5px; }
        .target-selector { margin-top: 15px; display: none; }
        button { padding: 10px 20px; cursor: pointer; background: #ff9800; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .dead { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>💩 UNCHI GOD FIELD</h1>
    
    <div class="player-area" id="players">
        </div>

    <div id="turn-info"></div>

    <div class="hand" id="hand">
        </div>

    <div class="target-selector" id="target-selector">
        <p>対象を選択してください：</p>
        <div id="target-buttons"></div>
    </div>

    <div class="log" id="log">
        <div>ゲーム開始！誰が最初に漏らすかな？</div>
    </div>
</div>

<script>
    const players = [
        { name: "あらい", hp: 100, maxHp: 100, hand: [], isDead: false },
        { name: "ひまだ", hp: 100, maxHp: 100, hand: [], isDead: false },
        { name: "やまさん", hp: 100, maxHp: 100, hand: [], isDead: false }
    ];

    const cardTypes = [
        { name: "軟便", type: "attack", value: 15, desc: "地味に痛い" },
        { name: "硬便", type: "attack", value: 25, desc: "かなりの衝撃" },
        { name: "下痢", type: "attack", value: 40, desc: "即死級の威力" },
        { name: "紙", type: "heal", value: 20, desc: "自分を拭く" },
        { name: "ウォシュレット", type: "heal", value: 45, desc: "超回復" },
        { name: "おなら", type: "special", value: 0, desc: "何も起きない" }
    ];

    let turnIndex = 0;
    let selectedCard = null;

    function init() {
        players.forEach(p => {
            for(let i=0; i<3; i++) p.hand.push(getRandomCard());
        });
        render();
    }

    function getRandomCard() {
        return cardTypes[Math.floor(Math.random() * cardTypes.length)];
    }

    function render() {
        const playerArea = document.getElementById('players');
        playerArea.innerHTML = '';
        players.forEach((p, i) => {
            playerArea.innerHTML += `
                <div class="player ${i === turnIndex ? 'active' : ''} ${p.isDead ? 'dead' : ''}">
                    <strong>${p.name}</strong>
                    <div>HP: ${p.hp}%</div>
                    <div class="hp-bar" style="width: ${p.hp}%; background: ${p.hp < 30 ? '#f44336' : '#4caf50'}"></div>
                </div>
            `;
        });

        const turnInfo = document.getElementById('turn-info');
        if (!players[turnIndex].isDead) {
            turnInfo.innerHTML = `<h3>${players[turnIndex].name} のターン</h3>`;
            renderHand();
        } else {
            nextTurn();
        }
    }

    function renderHand() {
        const handArea = document.getElementById('hand');
        handArea.innerHTML = '';
        const currentPlayer = players[turnIndex];
        currentPlayer.hand.forEach((card, i) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.innerHTML = `<span>${card.name}</span><span style="font-size:10px; color:gray">${card.desc}</span>`;
            cardEl.onclick = () => selectCard(i);
            handArea.appendChild(cardEl);
        });
    }

    function selectCard(index) {
        selectedCard = index;
        const card = players[turnIndex].hand[index];
        const targetSelector = document.getElementById('target-selector');
        const targetButtons = document.getElementById('target-buttons');
        
        if (card.type === 'heal' || card.name === 'おなら') {
            applyCard(turnIndex); // 自分に使用
        } else {
            targetSelector.style.display = 'block';
            targetButtons.innerHTML = '';
            players.forEach((p, i) => {
                if (!p.isDead && i !== turnIndex) {
                    const btn = document.createElement('button');
                    btn.innerText = p.name;
                    btn.onclick = () => applyCard(i);
                    btn.style.margin = "5px";
                    targetButtons.appendChild(btn);
                }
            });
        }
    }

    function applyCard(targetIndex) {
        const attacker = players[turnIndex];
        const card = attacker.hand.splice(selectedCard, 1)[0];
        const target = players[targetIndex];
        const log = document.getElementById('log');

        let message = `${attacker.name}は「${card.name}」を使った！ `;

        if (card.type === 'attack') {
            target.hp -= card.value;
            message += `${target.name}に ${card.value} のダメージ！`;
            if (target.hp <= 0) {
                target.hp = 0;
                target.isDead = true;
                message += ` 💩${target.name}は全漏れした！`;
            }
        } else if (card.type === 'heal') {
            target.hp = Math.min(target.maxHp, target.hp + card.value);
            message += `${target.name}のパンツが綺麗になった（+${card.value}）`;
        } else {
            message += `しかし、透かしっ屁だった。`;
        }

        log.innerHTML = `<div>${message}</div>` + log.innerHTML;
        document.getElementById('target-selector').style.display = 'none';
        
        checkWin();
        nextTurn();
    }

    function nextTurn() {
        attacker = players[turnIndex];
        if(attacker.hand.length < 5) attacker.hand.push(getRandomCard());
        
        turnIndex = (turnIndex + 1) % players.length;
        if (players.filter(p => !p.isDead).length > 1) {
            if (players[turnIndex].isDead) nextTurn();
            else render();
        }
    }

    function checkWin() {
        const alivePlayers = players.filter(p => !p.isDead);
        if (alivePlayers.length === 1) {
            alert(`優勝：${alivePlayers[0].name}！\n彼は最後まで耐え抜きました。`);
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
